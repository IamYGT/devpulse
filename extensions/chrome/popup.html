<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      min-height: 200px;
      background: #0a0a14;
      color: #e0e0e8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e1e2e;
    }
    .header img { width: 24px; height: 24px; }
    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #ffffff;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
      padding: 8px 10px;
      background: #12121e;
      border-radius: 6px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e80; }
    .status-dot.disconnected { background: #ef4444; box-shadow: 0 0 6px #ef444480; }
    .status-text { font-size: 13px; }
    .info-section {
      margin-bottom: 12px;
    }
    .info-label {
      font-size: 11px;
      color: #8888a0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .info-value {
      font-size: 13px;
      color: #c0c0d0;
      word-break: break-all;
      line-height: 1.4;
    }
    .info-value.domain {
      color: #60a5fa;
      font-weight: 500;
    }
    .stats-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: #12121e;
      border-radius: 6px;
      margin-top: 14px;
    }
    .stats-label { color: #8888a0; font-size: 12px; }
    .stats-value { color: #60a5fa; font-weight: 600; font-size: 14px; }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="DevPulse">
    <h1>DevPulse Tab Tracker</h1>
  </div>

  <div class="status-row">
    <div id="statusDot" class="status-dot disconnected"></div>
    <span id="statusText" class="status-text">Kontrol ediliyor...</span>
  </div>

  <div class="info-section">
    <div class="info-label">Aktif Sekme</div>
    <div id="tabDomain" class="info-value domain">-</div>
    <div id="tabUrl" class="info-value" style="font-size: 11px; color: #6a6a80; margin-top: 2px;">-</div>
  </div>

  <div class="stats-row">
    <span class="stats-label">Takip edilen sekme</span>
    <span id="trackedCount" class="stats-value">0</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
